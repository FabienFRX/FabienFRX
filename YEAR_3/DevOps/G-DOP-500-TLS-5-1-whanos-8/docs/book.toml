[book]
title = "Whanos Documentation"
authors = ["Whanos Team"]
language = "en"
multilingual = false
src = "src"
description = "Complete documentation for the Whanos infrastructure - Automatically Deploy Nearly Anything!"

[build]
build-dir = "book"
create-missing = true

[output.html]
mathjax-support = false
git-repository-url = "https://github.com/your-repo/whanos"
edit-url-template = "https://github.com/your-repo/whanos/edit/main/docs/{path}"
site-url = "/whanos/"
cname = ""
default-theme = "navy"
preferred-dark-theme = "navy"
smart-punctuation = true
copy-fonts = true
no-section-label = false

[output.html.print]
enable = true

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
