apiVersion: v1
kind: PersistentVolume
metadata:
  name: hello-world-pv
spec:
  capacity:
    storage: 512Mi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data/hello-world"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hello-world-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: hello-world-pod
  labels:
    app: hello-world
spec:
  containers:
    - name: hello-world
      image: nginx
      ports:
        - name: http
          containerPort: 80
          protocol: TCP
      env:
        - name: FOO
          value: "bar"
      volumeMounts:
        - name: hello-storage
          mountPath: /usr/share/nginx/html
  volumes:
    - name: hello-storage
      persistentVolumeClaim:
        claimName: hello-world-pvc
